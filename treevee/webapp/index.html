<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treevee — Tree Search Visualizer</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="lib/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="lib/diff_match_patch.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>treevee snapshot visualizer</h1>
      <p class="subtitle">a tree-search companion 🌲🌀</p>
    </header>

    <main id="dashboard" style="display:none">
      <!-- Summary bar -->
      <section id="summary-bar" style="font-size:15px;color:var(--text-secondary);margin-bottom:12px;"></section>

      <!-- Tab bar -->
      <nav id="tab-bar">
        <button class="tab-btn active" data-tab="chart">Score Progression</button>
        <button class="tab-btn" data-tab="iterations">Iterations</button>
        <button class="tab-btn" data-tab="tree">MCTS Tree</button>
      </nav>

      <!-- Tab panels -->
      <div class="tab-panel active" id="tab-chart">
        <section id="chart-section">
          <h2>Score Progression</h2>
          <div class="chart-container">
            <canvas id="score-chart"></canvas>
          </div>
        </section>
      </div>

      <div class="tab-panel" id="tab-iterations">
        <section id="iterations-panel">
          <h2>Iterations</h2>
          <div id="iterations-list"></div>
        </section>
      </div>

      <div class="tab-panel" id="tab-tree">
        <section id="tree-panel">
          <h2>MCTS Tree</h2>
          <div class="tree-controls">
            <button id="fit-horizontal">Fit horizontally</button>
            <button id="fit-vertical">Fit vertically</button>
            <button id="reset-view">Reset view</button>
          </div>
          <div id="tree-container"></div>
        </section>
      </div>

      <!-- Node details section -->
      <section id="diff-section" style="display:none">
        <div class="section-header">
          <h2>Node Details</h2>
          <button id="close-diff" style="display:none">Close</button>
        </div>
        <div class="diff-controls">
        <div id="diff-output" class="diff-output"></div>
      </section>

    </main>

    <footer class="cute-footer">
      <div class="footer-rule" aria-hidden="true"></div>
      <div class="made-with">made with <span class="heart">♡</span></div>
    </footer>

  </div>

  <script src="js/state-loader.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/tree-viz.js"></script>
  <script src="js/diff-viewer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
