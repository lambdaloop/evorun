# Example ~/.config/evorun/evorun.toml
# Copy to ~/.config/evorun/evorun.toml and adjust as needed.
# This config controls the planner and editor LLM models/providers.

[planner]
model = "claude-opus-4-5"
provider = "anthropic"
api_key = ""

[editor]
model = "claude-sonnet-4-6"
provider = "anthropic"
api_key = ""
